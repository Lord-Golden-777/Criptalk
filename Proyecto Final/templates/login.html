<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Iniciar sesión</title>

  <!-- ESTILOS INCRUSTADOS: copia de login.css integrada para que se aplique YA -->
  <style>
    /* Reset y box-sizing */
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    /* Fondo y centrado */
    body {
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Contenedor principal */
    .login-page {
      width: 100%;
      max-width: 980px;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Tarjeta blanca del formulario */
    .login-card {
      width: 360px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(3, 10, 24, 0.25);
      padding: 28px;
      text-align: center;
      animation: slide-up 560ms cubic-bezier(.2,.9,.3,1);
    }

    /* Header de la tarjeta */
    .login-header h1 { margin: 0 0 6px 0; font-size: 22px; color: #153a5b; letter-spacing: 0.2px; }
    .login-header .subtitle { margin: 0 0 18px 0; font-size: 13px; color: #64748b; }

    /* Formulario */
    .login-form { display: flex; flex-direction: column; gap: 12px; }
    .login-form input[type="text"], .login-form input[type="password"] {
      width: 100%; padding: 12px 14px; border-radius: 999px; border: 1px solid #e6eef8;
      background: #fbfdff; font-size: 14px; outline: none;
      transition: box-shadow .18s ease, border-color .18s ease, transform .08s ease;
    }
    .login-form input:focus {
      border-color: #2a5298;
      box-shadow: 0 6px 18px rgba(42,82,152,0.12);
      transform: translateY(-1px);
    }

    /* Botón principal */
    .btn-primary {
      display: inline-block; border: none;
      background: linear-gradient(180deg, #2a5298 0%, #1e3c72 100%);
      color: #fff; padding: 12px 18px; border-radius: 999px; font-size: 15px; font-weight: 600;
      cursor: pointer; box-shadow: 0 8px 20px rgba(42,82,152,0.18);
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 14px 28px rgba(42,82,152,0.22); }
    .btn-primary:active { transform: translateY(-1px); }

    /* Footer */
    .login-footer { margin-top: 14px; font-size: 13px; color: #475569; }
    .login-footer a { color: #1e3c72; font-weight: 600; text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }

    /* Flash messages (mensajes de error o éxito) */
    .flash-list { margin-bottom: 8px; }
    .flash { padding: 8px 10px; border-radius: 8px; font-size: 13px; margin-bottom: 6px; }
    .flash-warning { background: #fff4e5; color: #664d03; border: 1px solid #ffecb5; }
    .flash-success { background: #ecfdf5; color: #064e3b; border: 1px solid #bbf7d0; }
    .flash-danger { background: #ffeef0; color: #58151c; border: 1px solid #fecaca; }

    /* Accesibilidad: etiquetas ocultas para screen readers */
    .visually-hidden {
      position: absolute !important; height: 1px; width: 1px; overflow: hidden;
      clip: rect(1px, 1px, 1px, 1px);
      white-space: nowrap; border: 0; padding: 0; margin: -1px;
    }

    /* Animaciones */
    @keyframes slide-up { from { transform: translateY(26px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Responsive: tarjetas más pequeñas en móviles */
    @media (max-width: 420px) { .login-card { width: calc(100% - 32px); padding: 20px; } .login-header h1 { font-size: 20px; } }
  </style>
</head>
<body>
  <main class="login-page">
    <div class="login-card" role="region" aria-label="Formulario de inicio de sesión">

      <!-- Header del login -->
      <header class="login-header">
        <h1>Iniciar sesión</h1>
        <p class="subtitle">Accede a tu cuenta</p>
      </header>

      <!-- Formulario -->
      <form method="POST" class="login-form" novalidate>

        <!-- Flash messages: errores o alertas -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-list">
              {% for category, msg in messages %}
                <div class="flash flash-{{ category }}">{{ msg }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <!-- Input usuario -->
        <label class="visually-hidden" for="username">Usuario</label>
        <input id="username" name="username" type="text" placeholder="Usuario" required autocomplete="username">

        <!-- Input contraseña -->
        <label class="visually-hidden" for="password">Contraseña</label>
        <input id="password" name="password" type="password" placeholder="Contraseña" required autocomplete="current-password">

        <!-- Botón enviar -->
        <button type="submit" class="btn-primary">Entrar</button>
      </form>

      <!-- Footer: enlace a registro -->
      <footer class="login-footer">
        <p>¿No tienes cuenta? <a href="{{ url_for('auth.register') }}">Regístrate</a></p>
      </footer>

    </div>
  </main>
</body>
</html>
